services:
  wordpress:
    volumes:
      # Bind-mount wp-content for local development so IDE can edit themes/plugins/uploads
      - ./wp-content:/var/www/html/wp-content:cached
      # NOTE: do NOT bind-mount the entrypoint script by default.
      # The entrypoint is baked into the image with correct permissions.
      # If you edit the entrypoint, update the file in `wordpress/` and rebuild the image.
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
